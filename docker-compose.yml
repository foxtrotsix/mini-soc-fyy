services:
  # --- Web Application ---
  app:
    build: .
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    networks:
      default:
        aliases:
          - app

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "81:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      default:
        aliases:
          - nginx

  # --- Cloudflare Tunnel ---
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: always
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - /home/juanz/.cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - /home/juanz/.cloudflared/f9109f3a-c2a8-4049-b8a4-83e87e21890f.json:/etc/cloudflared/f9109f3a-c2a8-4049-b8a4-83e87e21890f.json:ro
    depends_on:
      - nginx

networks:
  default:
    driver: bridge
