<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GourmetHub | Menu</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar glass">
        <div class="logo">GourmetHub</div>
        <div style="display: flex; gap: 20px; align-items: center;">
            <span id="userNameDisplay" style="color: white; font-size: 0.9rem; font-weight: 500;"></span>
            <div id="cartToggle" style="cursor: pointer; position: relative;">
                <i class="fas fa-shopping-cart" style="font-size: 1.4rem;"></i>
                <span id="cartCount" style="position: absolute; top: -10px; right: -10px; background: var(--accent); color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.7rem;">0</span>
            </div>
        </div>
    </nav>

    <div class="container">
        <header style="margin-bottom: 40px; text-align: center;">
            <h1 style="font-size: 3rem; margin-bottom: 10px;">Exquisite Flavors</h1>
            <p style="color: var(--text-dim);">Selected by our master chefs for your pleasure.</p>
        </header>

        <div style="display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px;" id="categoryList">
            <!-- Categories will be loaded here -->
        </div>

        <div class="food-grid" id="foodGrid">
            <!-- Food items will be loaded here -->
            <div style="grid-column: 1/-1; text-align: center; padding: 50px;">
                <p>Loading exquisite cuisines...</p>
            </div>
        </div>
    </div>

    <!-- Cart Sidebar -->
    <aside class="cart-sidebar glass" id="cartSidebar">
        <div class="cart-header">
            <h3>Your Selection</h3>
            <i class="fas fa-times" id="closeCart" style="cursor: pointer;"></i>
        </div>
        <div class="cart-items" id="cartItems">
            <!-- Cart items will be listed here -->
        </div>
        <div style="padding-top: 20px; border-top: 1px solid var(--glass-border);">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <span>Total</span>
                <span id="cartTotal" style="font-weight: 700; color: var(--primary);">$0.00</span>
            </div>
            <button class="btn btn-primary" style="width: 100%;" id="checkoutBtn">Checkout</button>
        </div>
    </aside>

    <script src="js/app.js"></script>
    <script>
        // Set user name
        const user = localStorage.getItem('user');
        if (!user) window.location.href = 'login.html';
        document.getElementById('userNameDisplay').textContent = `Welcome, ${user}`;
    </script>
</body>
</html>
