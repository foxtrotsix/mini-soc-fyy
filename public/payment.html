<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GourmetHub | Payment</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar glass">
        <div class="logo">GourmetHub</div>
        <a href="index.html" style="color: var(--text-dim); text-decoration: none;"><i class="fas fa-arrow-left"></i> Back to Menu</a>
    </nav>

    <div class="container">
        <div class="payment-wrapper">
            <h2 style="margin-bottom: 30px; font-size: 2.5rem;">Secure Checkout</h2>
            
            <div class="payment-grid">
                <!-- Order Summary -->
                <div class="glass" style="padding: 30px;">
                    <h3 style="margin-bottom: 20px;">Order Summary</h3>
                    <div id="summaryItems" style="margin-bottom: 20px;">
                        <!-- Items will be listed here -->
                    </div>
                    <div style="padding-top: 15px; border-top: 1px solid var(--glass-border);">
                        <div style="display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 700;">
                            <span>Total Amount</span>
                            <span id="summaryTotal" style="color: var(--primary);">$0.00</span>
                        </div>
                    </div>
                </div>

                <!-- Payment Form -->
                <div class="glass" style="padding: 30px;">
                    <h3 style="margin-bottom: 20px;">Payment Details</h3>
                    <form id="paymentForm">
                        <div class="input-group">
                            <label>Cardholder Name</label>
                            <input type="text" placeholder="John Doe" required>
                        </div>
                        <div class="input-group">
                            <label>Card Number</label>
                            <input type="text" placeholder="5555 5555 5555 5555" required>
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                            <div class="input-group">
                                <label>Expiry Date</label>
                                <input type="text" placeholder="MM/YY" required>
                            </div>
                            <div class="input-group">
                                <label>CVV</label>
                                <input type="text" placeholder="123" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Complete Purchase</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successOverlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 2000; align-items: center; justify-content: center; text-align: center;">
        <div class="glass" style="padding: 50px; max-width: 500px;">
            <i class="fas fa-check-circle" style="font-size: 5rem; color: var(--primary); margin-bottom: 20px;"></i>
            <h2 style="font-size: 2.5rem; margin-bottom: 10px;">Bon Appétit!</h2>
            <p style="color: var(--text-dim); margin-bottom: 30px;">Your order has been received and is being prepared by our master chefs.</p>
            <button class="btn btn-primary" onclick="window.location.href='index.html'">Order More</button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Load summary
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const summaryItems = document.getElementById('summaryItems');
        let total = 0;

        if (cart.length === 0) {
            window.location.href = 'index.html';
        }

        cart.forEach(item => {
            const div = document.createElement('div');
            div.style.display = 'flex';
            div.style.justifyContent = 'space-between';
            div.style.marginBottom = '10px';
            div.innerHTML = `<span>${item.name} x ${item.qty}</span><span>$${(item.price * item.qty).toFixed(2)}</span>`;
            summaryItems.appendChild(div);
            total += item.price * item.qty;
        });
        document.getElementById('summaryTotal').textContent = `$${total.toFixed(2)}`;

        document.getElementById('paymentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Clear cart and show success
            localStorage.removeItem('cart');
            document.getElementById('successOverlay').style.display = 'flex';
        });
    </script>
</body>
</html>
